<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <meta charset="UTF-8" />
  <title>BOPPY | A Cool Art Zine</title>

  <meta property="og:title" content="BOPPY | A Cool Art Zine">
  <meta property="og:description" content="A single-sheet, single-color, 8-page zine. Pretty tame, never lame!">
  <meta property="og:image" content="https://boppyzine.com/preview.png">
  <meta property="og:url" content="https://boppyzine.com">
  <meta property="og:type" content="website">

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #fff;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      border: 4px solid #000;
      border-radius: 34px;
      padding: 1rem;
    }

    .product-image {
      width: 100%;
      border-radius: 18px;
    }

    .buy-button {
      width: 100%;
      border-radius: 999px;
      padding: 0.6rem;
      background: #000;
      color: #fff;
      border: none;
      font-weight: 600;
    }

    .buy-button:active {
      transform: scale(0.97);
    }

    /* ✅ CLEAN CONTACT BANNER */
    .contact-banner {
      margin-top: 3rem;
      padding: 2rem 1rem;
      background: #000;
      color: #fff;
      text-align: center;
      border-radius: 34px;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.75rem 0;
    }

    .contact-banner a {
      color: #fff;
      font-weight: 600;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>

  <h1>BOPPY</h1>

  <div class="product-grid">

    <div class="product-card">
      <img src="boppy-sizes.png" class="product-image">
      <h3>BOPPY “Sizes”</h3>
      <p>Includes a random sticker sheet!</p>
      <button class="buy-button">Buy – $5</button>
    </div>

    <div class="product-card">
      <img src="boppy-grocery-store.png" class="product-image">
      <h3>BOPPY “Grocery Store”</h3>
      <p>Includes a random sticker sheet!</p>
      <button class="buy-button">Buy – $5</button>
    </div>

  </div>

  <!-- ✅ CONTACT -->
  <div class="contact-banner">
    <p>Keep in touch!</p>

    <div class="contact-links">
      <span>💌 <a href="mailto:boppyzine@gmail.com">boppyzine@gmail.com</a></span>
      <span>📸 <a href="https://www.instagram.com/boppyzine" target="_blank">@boppyzine</a></span>
    </div>

    <p>🖤 Please tag us! 🖤</p>
  </div>

  <footer>
    © <span id="year"></span> Thanks for being here!
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
